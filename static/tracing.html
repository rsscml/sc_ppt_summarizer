<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traces — SC Summarizer</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff; --bg: #fafafa; --surface-2: #f5f5f4; --surface-3: #eeeded;
    --border: #e5e4e2; --text: #1a1a1a; --text-2: #3d3d3d; --text-dim: #6b6b6b; --text-muted: #9a9a9a;
    --accent: #2c5282; --accent-light: #edf2f7;
    --green: #276749; --green-bg: #f0fff4;
    --amber: #975a16; --amber-bg: #fefcbf;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Instrument Sans', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 52px; background: var(--white); border-bottom: 1px solid var(--border);
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-family: var(--serif); font-weight: 600; font-size: 16px; letter-spacing: -0.03em; }
  .topbar-brand .mark { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--sans); font-weight: 700; font-size: 13px; }
  .topbar-nav { display: flex; gap: 2px; }
  .topbar-nav a { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text-dim); text-decoration: none; transition: all 0.15s; }
  .topbar-nav a:hover { background: var(--surface-2); color: var(--text); }
  .topbar-nav a.active { background: var(--accent-light); color: var(--accent); }

  .container { max-width: 1060px; margin: 0 auto; padding: 28px 32px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-header h1 { font-family: var(--serif); font-size: 24px; font-weight: 600; letter-spacing: -0.03em; }
  .btn-sm { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; background: var(--white); color: var(--text-dim); font-family: var(--sans); transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; font-family: var(--mono); letter-spacing: -0.03em; }
  .stat-card .value.accent { color: var(--accent); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.amber { color: var(--amber); }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-bar select {
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--white); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none;
  }
  .filter-bar select:focus { border-color: var(--accent); }

  .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 11px 16px; text-align: left; }
  th { background: var(--surface-2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { border-bottom: 1px solid var(--surface-3); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .node-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
  .node-badge.summarize { background: var(--accent-light); color: var(--accent); }
  .node-badge.executive { background: var(--green-bg); color: var(--green); }
  .node-badge.refine { background: var(--amber-bg); color: var(--amber); }

  .text-clip { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-dim); font-size: 12px; }
  .duration { font-family: var(--mono); font-size: 12px; color: var(--amber); font-weight: 500; }
  .ts { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

  .empty-state { text-align: center; padding: 64px 20px; color: var(--text-muted); }
  .empty-state .em { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><div class="mark">SC</div><span>Supply Chain Summarizer</span></div>
  <div class="topbar-nav">
    <a href="/">Summarizer</a>
    <a href="/gfd">GFD Dashboard</a>
    <a href="/tracing" class="active">Traces</a>
    <a href="/tokens">Token Usage</a>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1>Execution Traces</h1>
    <button class="btn-sm" onclick="loadTraces()">Refresh</button>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="label">Total Traces</div><div class="value accent" id="statCount">&mdash;</div></div>
    <div class="stat-card"><div class="label">Total Duration</div><div class="value amber" id="statDuration">&mdash;</div></div>
    <div class="stat-card"><div class="label">Avg Duration</div><div class="value green" id="statAvg">&mdash;</div></div>
  </div>

  <div class="filter-bar">
    <select id="filterSession" onchange="loadTraces()"><option value="">All Sessions</option></select>
    <select id="filterNode" onchange="applyFilter()">
      <option value="">All Nodes</option>
      <option value="summarize_section">Summarize Section</option>
      <option value="generate_executive_summary">Executive Summary</option>
      <option value="refine_summary">Refine</option>
      <option value="gfd_interpret_pg">GFD: Interpret PG</option>
      <option value="gfd_executive_overview">GFD: Overview</option>
    </select>
  </div>

  <div id="tableContainer">
    <div class="empty-state"><div class="em">&#x1F50D;</div><p>No traces yet. Generate a summary to see execution traces.</p></div>
  </div>
</div>

<script>
  let allTraces = [];

  async function loadTraces() {
    const sf = document.getElementById('filterSession').value;
    const url = sf ? `/api/traces?session_id=${sf}` : '/api/traces';
    try {
      const data = await (await fetch(url)).json();
      allTraces = data.entries;
      document.getElementById('statCount').textContent = data.totals.entry_count;
      document.getElementById('statDuration').textContent = (data.totals.total_duration_ms / 1000).toFixed(1) + 's';
      document.getElementById('statAvg').textContent = data.totals.entry_count
        ? (data.totals.total_duration_ms / data.totals.entry_count / 1000).toFixed(2) + 's' : '\u2014';
      const sel = document.getElementById('filterSession');
      const cur = sel.value;
      const sessions = [...new Set(allTraces.map(t => t.session_id))];
      sel.innerHTML = '<option value="">All Sessions</option>';
      sessions.forEach(s => { sel.innerHTML += `<option value="${s}" ${s===cur?'selected':''}>${s.slice(0,8)}...</option>`; });
      applyFilter();
    } catch (e) { console.error(e); }
  }

  function applyFilter() {
    const nf = document.getElementById('filterNode').value;
    let f = allTraces;
    if (nf) f = f.filter(t => t.node === nf);
    renderTable(f);
  }

  function nodeClass(n) {
    if (n.includes('summarize_section')) return 'summarize';
    if (n.includes('executive')) return 'executive';
    if (n.includes('refine')) return 'refine';
    if (n.includes('gfd_interpret')) return 'summarize';
    if (n.includes('gfd_executive')) return 'executive';
    return 'summarize';
  }

  function renderTable(traces) {
    if (!traces.length) {
      document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="em">&#x1F50D;</div><p>No traces match.</p></div>';
      return;
    }
    let h = '<div class="table-wrap"><table><thead><tr><th>Time</th><th>Node</th><th>Input</th><th>Output</th><th style="text-align:right">Duration</th></tr></thead><tbody>';
    traces.slice().reverse().forEach(t => {
      h += `<tr>
        <td class="ts">${new Date(t.timestamp).toLocaleTimeString()}</td>
        <td><span class="node-badge ${nodeClass(t.node)}">${t.node}</span></td>
        <td><div class="text-clip" title="${t.input_summary.replace(/"/g,'&quot;')}">${t.input_summary}</div></td>
        <td><div class="text-clip" title="${t.output_summary.replace(/"/g,'&quot;')}">${t.output_summary}</div></td>
        <td class="duration" style="text-align:right">${(t.duration_ms/1000).toFixed(2)}s</td>
      </tr>`;
    });
    h += '</tbody></table></div>';
    document.getElementById('tableContainer').innerHTML = h;
  }

  loadTraces();
  setInterval(loadTraces, 10000);
</script>
</body>
</html>
